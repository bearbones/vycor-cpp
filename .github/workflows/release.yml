name: Release

# Tag grammar (see COMPATIBILITY.md "Tagging and releases"):
#   vX.Y.Z          -- cut on main. Builds every major in
#                      VYCOR_SUPPORTED_LLVM_VERSIONS (as of the tagged commit).
#   vX.Y.Z-llvmNN   -- cut on a release/llvm-NN branch. Builds only major NN.
# Either form is built for every OS in the matrix below.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip GitHub Release creation and Homebrew tap update; upload build artifacts only'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  determine-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag and compute build matrix
        id: compute
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-}"

          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-llvm([0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            MAJORS="${BASH_REMATCH[2]}"
          elif [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            MAJORS=$(grep -oP 'set\(VYCOR_SUPPORTED_LLVM_VERSIONS\s+\K[0-9 ]+' CMakeLists.txt)
          else
            # workflow_dispatch on a branch with no tag: build against VERSION
            # and every major this ref supports, for a dry-run sanity check.
            VERSION=$(cat VERSION)
            MAJORS=$(grep -oP 'set\(VYCOR_SUPPORTED_LLVM_VERSIONS\s+\K[0-9 ]+' CMakeLists.txt)
          fi

          echo "Resolved version=$VERSION majors=$MAJORS"

          python3 - "$VERSION" "$MAJORS" <<'EOF'
          import json, os, sys
          version, majors_raw = sys.argv[1], sys.argv[2]
          majors = majors_raw.split()
          # macos-latest floats to whatever macOS major GitHub currently
          # recommends (see COMPATIBILITY.md "macOS runner and Apple Clang" --
          # hardcoded macos-NN labels have a hard retirement date and macos-13
          # already died mid-flight once). Apple Silicon (arm64) only: Apple
          # itself has exited x86_64, and GitHub's last Intel-Mac label
          # (macos-15-intel) sunsets with macos-15 in Fall 2027 -- not worth
          # the added matrix complexity for a shrinking install base.
          osen = ["ubuntu-24.04", "macos-latest"]
          matrix = {"include": [{"os": o, "llvm_major": m} for o in osen for m in majors]}
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"version={version}\n")
          EOF

  build:
    needs: determine-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    # macos-latest's current OS major (sequoia and newer, at last check) is
    # bottled by Homebrew's llvm@{18,20,21} formulas, so this doesn't need
    # the long from-source-build timeout the old macos-13 (Ventura) leg did.
    # If a future macos-latest bump lands on an OS major Homebrew hasn't
    # bottled yet, re-check https://formulae.brew.sh before assuming 60min
    # is still enough.
    timeout-minutes: 60
    name: ${{ matrix.os }} / LLVM ${{ matrix.llvm_major }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize Catch2 submodule
        run: git submodule update --init --depth 1 -- extern/Catch2

      - name: Install LLVM/Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "${{ matrix.llvm_major }}"
          sudo apt-get install -y \
            "llvm-${{ matrix.llvm_major }}-dev" \
            "libclang-${{ matrix.llvm_major }}-dev" \
            ninja-build

      - name: Install LLVM/Clang (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install "llvm@${{ matrix.llvm_major }}" ninja

      - name: Configure
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="/usr/lib/llvm-${{ matrix.llvm_major }}" \
              -DVYCOR_USE_SUBMODULE=OFF
          else
            # Host compiler is explicitly pinned to the system Apple Clang
            # (Xcode Command Line Tools), not Homebrew's clang++ -- matches
            # what a Mac user's own toolchain looks like. Homebrew's
            # llvm@NN supplies only the Clang/LLVM Tooling API (clangAST,
            # clangTooling, ...); it is never the compiler that builds
            # vycor-cpp itself. See COMPATIBILITY.md "macOS runner and
            # Apple Clang".
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$(brew --prefix "llvm@${{ matrix.llvm_major }}")" \
              -DCMAKE_C_COMPILER=/usr/bin/clang \
              -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
              -DVYCOR_USE_SUBMODULE=OFF
          fi

      - name: Build
        run: cmake --build build --target vycor-cpp

      - name: Build tests
        run: cmake --build build

      - name: Test (release gate)
        run: cd build && ctest --output-on-failure

      - name: Package
        id: pkg
        run: |
          case "${{ matrix.os }}" in
            ubuntu-24.04) OS_LABEL="linux-x86_64" ;;
            macos-latest) OS_LABEL="macos-arm64" ;;
          esac
          NAME="vycor-cpp-v${{ needs.determine-matrix.outputs.version }}-${OS_LABEL}-llvm${{ matrix.llvm_major }}"
          cmake --install build --prefix "dist/${NAME}"
          cp LICENSE "dist/${NAME}/" 2>/dev/null || true
          tar czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Attach to GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.pkg.outputs.asset }}
          prerelease: ${{ contains(github.ref_name, '-test') }}

      - name: Upload build artifact (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ${{ steps.pkg.outputs.asset }}

  update-homebrew-tap:
    needs: [determine-matrix, build]
    if: ${{ !inputs.dry_run && !contains(github.ref_name, '-test') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Update formula(s) in bearbones/homebrew-vycor-cpp
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VYCOR_VERSION: ${{ needs.determine-matrix.outputs.version }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: .github/workflows/scripts/update-tap-formula.sh
