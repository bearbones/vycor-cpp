name: Release

# Tag grammar (see COMPATIBILITY.md "Tagging and releases"):
#   vX.Y.Z          -- cut on main. Builds every major in
#                      VYCOR_SUPPORTED_LLVM_VERSIONS (as of the tagged commit).
#   vX.Y.Z-llvmNN   -- cut on a release/llvm-NN branch. Builds only major NN.
# Either form is built for every OS in the matrix below.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip GitHub Release creation and Homebrew tap update; upload build artifacts only'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  determine-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag and compute build matrix
        id: compute
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-}"

          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-llvm([0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            MAJORS="${BASH_REMATCH[2]}"
          elif [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            MAJORS=$(grep -oP 'set\(VYCOR_SUPPORTED_LLVM_VERSIONS\s+\K[0-9 ]+' CMakeLists.txt)
          else
            # workflow_dispatch on a branch with no tag: build against VERSION
            # and every major this ref supports, for a dry-run sanity check.
            VERSION=$(cat VERSION)
            MAJORS=$(grep -oP 'set\(VYCOR_SUPPORTED_LLVM_VERSIONS\s+\K[0-9 ]+' CMakeLists.txt)
          fi

          echo "Resolved version=$VERSION majors=$MAJORS"

          python3 - "$VERSION" "$MAJORS" <<'EOF'
          import json, os, sys
          version, majors_raw = sys.argv[1], sys.argv[2]
          majors = majors_raw.split()
          osen = ["ubuntu-24.04", "macos-13", "macos-14"]
          matrix = {"include": [{"os": o, "llvm_major": m} for o in osen for m in majors]}
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"version={version}\n")
          EOF

  build:
    needs: determine-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    # macos-13 (Ventura, Intel) has no Homebrew bottle for llvm@{18,20,21} as
    # of this writing -- only sonoma+ are bottled -- so that leg compiles
    # LLVM from source. This is a standing gap (Homebrew's bottle window
    # rolls forward while the macos-13 runner label stays pinned at
    # Ventura), not a transient one. Do not shrink this timeout without
    # re-checking https://formulae.brew.sh bottle availability first.
    timeout-minutes: ${{ matrix.os == 'macos-13' && 180 || 60 }}
    name: ${{ matrix.os }} / LLVM ${{ matrix.llvm_major }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize Catch2 submodule
        run: git submodule update --init --depth 1 -- extern/Catch2

      - name: Install LLVM/Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "${{ matrix.llvm_major }}"
          sudo apt-get install -y \
            "llvm-${{ matrix.llvm_major }}-dev" \
            "libclang-${{ matrix.llvm_major }}-dev" \
            ninja-build

      - name: Install LLVM/Clang (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install "llvm@${{ matrix.llvm_major }}" ninja

      - name: Configure
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            PREFIX="/usr/lib/llvm-${{ matrix.llvm_major }}"
          else
            PREFIX="$(brew --prefix "llvm@${{ matrix.llvm_major }}")"
          fi
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DVYCOR_USE_SUBMODULE=OFF

      - name: Build
        run: cmake --build build --target vycor-cpp

      - name: Build tests
        run: cmake --build build

      - name: Test (release gate)
        run: cd build && ctest --output-on-failure

      - name: Package
        id: pkg
        run: |
          case "${{ matrix.os }}" in
            ubuntu-24.04) OS_LABEL="linux-x86_64" ;;
            macos-13)     OS_LABEL="macos-x86_64" ;;
            macos-14)     OS_LABEL="macos-arm64" ;;
          esac
          NAME="vycor-cpp-v${{ needs.determine-matrix.outputs.version }}-${OS_LABEL}-llvm${{ matrix.llvm_major }}"
          cmake --install build --prefix "dist/${NAME}"
          cp LICENSE "dist/${NAME}/" 2>/dev/null || true
          tar czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "asset=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Attach to GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.pkg.outputs.asset }}
          prerelease: ${{ contains(github.ref_name, '-test') }}

      - name: Upload build artifact (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ${{ steps.pkg.outputs.asset }}

  update-homebrew-tap:
    needs: [determine-matrix, build]
    if: ${{ !inputs.dry_run && !contains(github.ref_name, '-test') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Update formula(s) in bearbones/homebrew-vycor-cpp
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VYCOR_VERSION: ${{ needs.determine-matrix.outputs.version }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: .github/workflows/scripts/update-tap-formula.sh
