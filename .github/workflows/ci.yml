name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        llvm-version: [18, 20, 21]

    name: LLVM ${{ matrix.llvm-version }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize Catch2 submodule
        run: git submodule update --init --depth 1 -- extern/Catch2

      - name: Install LLVM/Clang ${{ matrix.llvm-version }}
        env:
          LLVM_VERSION: ${{ matrix.llvm-version }}
        run: |
          # Use apt.llvm.org for all matrix versions so CI is reproducible
          # regardless of which LLVM versions Ubuntu's archive happens to ship.
          # Downstream hermetic builds are unaffected — this script lives in
          # the workflow only, not in CMake.
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh "$LLVM_VERSION"
          sudo apt-get install -y \
            "llvm-${LLVM_VERSION}-dev" \
            "libclang-${LLVM_VERSION}-dev" \
            ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DVYCOR_WERROR=ON \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-${{ matrix.llvm-version }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure
